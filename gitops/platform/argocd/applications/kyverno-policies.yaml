# =============================================================================
# ArgoCD Application — Kyverno Policies
# =============================================================================
# Deploys the Kyverno ClusterPolicies that enforce security guardrails:
#   - Disallow latest image tag
#   - Require resource limits on all containers
#   - Require app + team labels on Deployments
#   - Block privileged containers
#
# SYNC WAVE 2: ArgoCD will NOT start this until wave 1 (kyverno.yaml) is
# fully healthy. The CRD 'ClusterPolicy' must exist before we apply policies.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubeflow-ops
    type: security
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # Wait for Kyverno engine (wave 1) first
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/kubeflow-ops.git
    targetRevision: main
    path: gitops/platform/kyverno          # ← points to the policies.yaml folder
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno                     # ClusterPolicies are cluster-scoped but namespace is required
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
