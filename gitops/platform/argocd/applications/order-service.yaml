# =============================================================================
# ArgoCD Application — Order Service (Helm)
# =============================================================================
# Uses the multi-source pattern:
#   Source 1: Reference for values files (the repo itself)
#   Source 2: The shared Helm chart + values files
#
# ArgoCD renders the Helm chart with the values files and deploys it.
# When CI updates image.tag in values.yaml → ArgoCD detects → redeploys.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubeflow-ops
    type: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Source 1: Repo reference (so we can reference values files by $repo path)
    - repoURL: https://github.com/YOUR_USERNAME/kubeflow-ops.git
      targetRevision: main
      ref: repo
    # Source 2: The Helm chart + values files
    - repoURL: https://github.com/YOUR_USERNAME/kubeflow-ops.git
      targetRevision: main
      path: gitops/charts/microservice
      helm:
        valueFiles:
          - $repo/gitops/apps/order-service/values.yaml
          - $repo/gitops/apps/order-service/values-dev.yaml # Change to values-prod.yaml for prod
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow-ops
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
