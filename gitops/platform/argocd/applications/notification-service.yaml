# =============================================================================
# ArgoCD Application — Notification Service (Helm)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubeflow-ops
    type: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/YOUR_USERNAME/kubeflow-ops.git
      targetRevision: main
      ref: repo
    - repoURL: https://github.com/YOUR_USERNAME/kubeflow-ops.git
      targetRevision: main
      path: gitops/charts/microservice
      helm:
        valueFiles:
          - $repo/gitops/apps/notification-service/values.yaml
          - $repo/gitops/apps/notification-service/values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow-ops
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
