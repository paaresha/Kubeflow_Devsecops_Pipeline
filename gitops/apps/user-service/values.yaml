# =============================================================================
# User Service — Helm Values (Base)
# =============================================================================

name: user-service
containerPort: 8002

image:
  repository: IMAGE_PLACEHOLDER
  tag: latest

service:
  port: 8002

# User service has fewer env vars — no SQS, no Redis
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: url
