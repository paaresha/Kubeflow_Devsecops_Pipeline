# =============================================================================
# Order Service — Prod Environment Overrides
# =============================================================================
# Production-grade settings: higher resources, more replicas.
# =============================================================================

replicaCount: 3

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  minReplicas: 3
  maxReplicas: 20
