# SonarQube Project Configuration
# This file tells the SonarQube scanner how to analyze the project.
# In CI, the -D flags in the workflow override these per-service.
# This file is the fallback for local manual scans.

sonar.projectKey=kubeflow-ops-order-service
sonar.projectName=Order Service
sonar.projectVersion=1.0

# Source directories
sonar.sources=apps/order-service
sonar.tests=apps/order-service/tests

# Language
sonar.language=py

# Python-specific settings
sonar.python.version=3.12
sonar.python.coverage.reportPaths=apps/order-service/coverage.xml

# Exclusions — don't scan these
sonar.exclusions=\
    **/venv/**,\
    **/node_modules/**,\
    **/__pycache__/**,\
    **/tests/**,\
    **/migrations/**

# Test exclusions
sonar.test.exclusions=**/tests/**

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate — fail if:
#   - Code coverage < 70%
#   - Duplicated lines > 3%
#   - Any critical or blocker bugs
#   - Any critical security vulnerabilities
